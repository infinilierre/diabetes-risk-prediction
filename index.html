<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Analyzer | Nordic Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; }
        .gender-btn.active { background-color: #0f172a; color: white; border-color: #0f172a; }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-none p-10 border border-slate-100 relative overflow-hidden shadow-sm">
        
        <div class="text-center mb-8">
            <div class="inline-flex p-4 bg-slate-50 rounded-full mb-4 text-slate-600 border border-slate-100 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4.8 2.8C3.5 2.8 2.5 3.8 2.5 5v3c0 4.1 3.4 7.5 7.5 7.5s7.5-3.4 7.5-7.5V5c0-1.2-1-2.2-2.2-2.2"></path>
                    <path d="M10 15.5v4"></path><path d="M8 21.5h4"></path>
                    <circle cx="17.5" cy="18.5" r="3"></circle><path d="M20.5 18.5h1"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-950 uppercase">Diabetes <span class="font-light text-slate-600">Risk Analyzer</span></h1>
        </div>

        <div class="space-y-5 relative text-center">
            <div class="flex gap-2 mb-6">
                <button onclick="setGender('female')" id="btnFemale" class="gender-btn active flex-1 py-3 border border-slate-200 text-[11px] font-bold uppercase tracking-widest transition-all">Female</button>
                <button onclick="setGender('male')" id="btnMale" class="gender-btn flex-1 py-3 border border-slate-200 text-[11px] font-bold uppercase tracking-widest transition-all">Male</button>
            </div>

            <div>
                <label class="block text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2">Glucose Level (mg/dL)</label>
                <input type="number" id="glucose" value="115" class="w-full bg-slate-50 border border-slate-100 rounded-none p-4 outline-none focus:border-slate-950 transition-all text-center text-lg shadow-inner">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2">Weight (kg)</label>
                    <input type="number" id="weight" value="65" class="w-full bg-slate-50 border border-slate-100 rounded-none p-4 outline-none focus:border-slate-950 transition-all text-center text-lg shadow-inner">
                </div>
                <div>
                    <label class="block text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2">Height (cm)</label>
                    <input type="number" id="height" value="168" class="w-full bg-slate-50 border border-slate-100 rounded-none p-4 outline-none focus:border-slate-950 transition-all text-center text-lg shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-2">Subject Age</label>
                <input type="number" id="age" value="28" class="w-full bg-slate-50 border border-slate-100 rounded-none p-4 outline-none focus:border-slate-950 transition-all text-center text-lg shadow-inner">
            </div>

            <button onclick="analyzeRisk()" id="btnAction" class="w-full bg-slate-950 hover:bg-slate-800 text-white py-5 rounded-none font-semibold text-xs uppercase tracking-[0.2em] transition-all shadow-md active:scale-[0.98] mt-2">
                Analyze Risk
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-7 rounded-none hidden border border-slate-100 bg-white shadow-inner text-center">
            <p id="bmiDisplay" class="text-[9px] font-bold text-slate-400 uppercase mb-2"></p>
            <p id="resultText" class="font-bold text-xl text-slate-950"></p>
            <p id="scoreTag" class="text-[10px] font-medium mt-2 text-slate-500 uppercase tracking-widest"></p>
        </div>
    </div>

    <script>
        let selectedGender = 'female';
        const API_URL = "https://diabetes-risk-prediction-dpgj.onrender.com/predict";

        function setGender(gender) {
            selectedGender = gender;
            document.getElementById('btnFemale').classList.toggle('active', gender === 'female');
            document.getElementById('btnMale').classList.toggle('active', gender === 'male');
        }

        async function analyzeRisk() {
            const box = document.getElementById('resultBox');
            const btn = document.getElementById('btnAction');
            const weight = parseFloat(document.getElementById('weight').value);
            const heightM = parseFloat(document.getElementById('height').value) / 100;
            const calculatedBMI = (weight / (heightM * heightM)).toFixed(1);

            btn.disabled = true;
            btn.innerText = "Analyzing...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        glucose: parseFloat(document.getElementById('glucose').value),
                        bmi: parseFloat(calculatedBMI),
                        age: parseInt(document.getElementById('age').value, 10),
                        gender: selectedGender
                    })
                });

                const data = await response.json();
                box.classList.remove('hidden');
                
                // Gender ve BMI burada yazılıyor:
                document.getElementById('bmiDisplay').innerText = `BMI: ${calculatedBMI} | Gender: ${selectedGender.toUpperCase()}`;
                document.getElementById('resultText').innerText = data.risk_score > 50 ? "Condition: High Risk" : "Condition: Low Risk";
                document.getElementById('scoreTag').innerText = `Confidence Score: ${(100 - data.risk_score).toFixed(1)}%`;
            } catch (err) {
                box.classList.remove('hidden');
                document.getElementById('resultText').innerText = "Network Error.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Analyze Risk";
            }
        }
    </script>
</body>
</html>
