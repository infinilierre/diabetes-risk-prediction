<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white p-8 border border-slate-100 shadow-sm relative">
        
        <div class="text-center mb-10 mt-4">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">
                <span>Clinical</span> 
                <span class="font-light text-slate-500 italic">Analysis</span>
            </h1>
            <div class="h-1 w-12 bg-slate-950 mx-auto mt-2"></div>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Glucose Level (mg/dL)</label>
                <input type="number" id="glucose" value="100" class="w-full bg-slate-50 border border-slate-100 p-4 text-center text-xl outline-none focus:border-slate-950">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Weight (kg)</label>
                    <input type="number" id="weight" value="100" class="w-full bg-slate-50 border border-slate-100 p-4 text-center text-xl outline-none focus:border-slate-950">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Height (cm)</label>
                    <input type="number" id="height" value="175" class="w-full bg-slate-50 border border-slate-100 p-4 text-center text-xl outline-none focus:border-slate-950">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center">Subject Age</label>
                <input type="number" id="age" value="24" class="w-full bg-slate-50 border border-slate-100 p-4 text-center text-xl outline-none focus:border-slate-950">
            </div>
            <button onclick="runInference()" id="btnAction" class="w-full bg-slate-950 text-white py-5 font-bold text-[11px] uppercase tracking-[0.3em] hover:bg-slate-800 transition-all active:scale-95">
                Run Clinical Inference
            </button>
        </div>

        <div id="resultBox" class="mt-10 p-6 hidden border border-slate-100 bg-slate-50 text-center">
            <p id="bmiDisplay" class="text-[10px] font-bold text-slate-400 uppercase mb-2"></p>
            <div class="flex items-center justify-center gap-2">
                <p id="resultText" class="font-bold text-2xl text-slate-950"></p>
                <span id="riskDot" class="h-3 w-3 rounded-full"></span>
            </div>
            <p class="text-[11px] text-slate-500 italic leading-relaxed pt-4 border-t border-slate-200 mt-4 px-2">Analysis complete.</p>
        </div>
    </div>

    <script>
        const API_URL = "https://diabetes-risk-prediction-dpgj.onrender.com/predict";

        async function runInference() {
            const btn = document.getElementById('btnAction');
            const box = document.getElementById('resultBox');
            
            const gVal = parseFloat(document.getElementById('glucose').value);
            const wVal = parseFloat(document.getElementById('weight').value);
            const hVal = parseFloat(document.getElementById('height').value);
            const aVal = parseInt(document.getElementById('age').value);

            if (isNaN(gVal) || gVal < 20 || gVal > 500 || hVal < 50 || hVal > 250 || wVal < 10 || wVal > 300 || aVal < 1 || aVal > 120) {
                alert("Please enter realistic medical values:\n- Glucose: 20-500 mg/dL\n- Height: 50-250 cm\n- Weight: 10-300 kg\n- Age: 1-120 years");
                return;
            }

            const bmi = (wVal / ((hVal/100) * (hVal/100))).toFixed(1);
            btn.innerText = "...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ glucose: gVal, bmi: parseFloat(bmi), age: aVal })
                });
                const data = await response.json();
                box.classList.remove('hidden');
                document.getElementById('bmiDisplay').innerText = `Computed BMI: ${bmi}`;
                document.getElementById('resultText').innerText = `${data.risk_score}% Risk Score`;
                document.getElementById('riskDot').style.backgroundColor = data.risk_score > 40 ? "#ef4444" : "#22c55e";
            } catch (err) {
                alert("Cloud connection error.");
            } finally {
                btn.innerText = "Run Clinical Inference";
            }
        }
    </script>
</body>
</html>
