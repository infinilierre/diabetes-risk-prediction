<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Analyzer | Academic Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-[#1e293b] rounded-2xl shadow-2xl p-10 border border-slate-700/50">
        
        <div class="mb-10 border-b border-slate-700/50 pb-6">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">
                DIABETES RISK ANALYZER
            </h1>
            <p class="text-blue-400 text-xs font-bold uppercase tracking-[0.2em] mt-2">
                Machine Learning Deployment Phase v1.0
            </p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">Glucose Concentration (mg/dL)</label>
                <input type="number" id="glucose" value="120" 
                    class="w-full bg-[#0f172a] border border-slate-700 rounded-lg p-4 outline-none focus:border-blue-500 transition-colors text-white font-semibold">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">Body Mass Index (BMI)</label>
                    <input type="number" id="bmi" value="26.2" step="0.1" 
                        class="w-full bg-[#0f172a] border border-slate-700 rounded-lg p-4 outline-none focus:border-blue-500 transition-colors text-white font-semibold">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2">Subject Age</label>
                    <input type="number" id="age" value="30" 
                        class="w-full bg-[#0f172a] border border-slate-700 rounded-lg p-4 outline-none focus:border-blue-500 transition-colors text-white font-semibold">
                </div>
            </div>

            <button onclick="analyzeRisk()" id="btnAction"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-lg font-bold text-sm uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40 mt-4">
                Execute Analysis
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-6 rounded-xl hidden border transition-all duration-500">
            <div class="flex items-center justify-between mb-2">
                <span id="resultHeader" class="text-[10px] font-black uppercase tracking-tighter">Diagnostic Output</span>
                <span id="scoreTag" class="text-xs font-bold"></span>
            </div>
            <p id="resultText" class="font-bold text-lg leading-tight"></p>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-700/50 flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase tracking-widest">
            <span>Model: Random Forest</span>
            <span>Cloud: Render Cluster</span>
        </div>
    </div>

    <script>
        const API_URL = "https://diabetes-risk-prediction-dpgj.onrender.com/predict";

        async function analyzeRisk() {
            const box = document.getElementById('resultBox');
            const text = document.getElementById('resultText');
            const score = document.getElementById('scoreTag');
            const btn = document.getElementById('btnAction');

            btn.disabled = true;
            btn.innerText = "Processing...";
            btn.style.opacity = "0.5";

            const payload = {
                glucose: parseFloat(document.getElementById('glucose').value),
                bmi: parseFloat(document.getElementById('bmi').value),
                age: parseInt(document.getElementById('age').value, 10)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                box.classList.remove('hidden');

                if (data.risk_score > 50) {
                    box.className = 'mt-8 p-6 rounded-xl border-red-500/30 bg-red-500/5 text-red-400';
                    text.innerText = data.interpretation;
                    score.innerText = "Score: " + data.risk_score + "%";
                } else {
                    box.className = 'mt-8 p-6 rounded-xl border-emerald-500/30 bg-emerald-500/5 text-emerald-400';
                    text.innerText = data.interpretation;
                    score.innerText = "Score: " + data.risk_score + "%";
                }
            } catch (err) {
                box.classList.remove('hidden');
                box.className = 'mt-8 p-6 rounded-xl border-slate-700 bg-slate-800 text-slate-400 text-xs';
                text.innerText = "System Error: Connection to cloud inference engine failed.";
                score.innerText = "ERR_CONN";
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute Analysis";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
